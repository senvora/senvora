name: reset

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type ERASE to keep only the latest commit and workflow run"
        required: true
        default: "NO"

jobs:
  squash:
    runs-on: ubuntu-latest

    steps:
      - name: Confirm destructive action
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "ERASE" ]; then
            echo "Confirmation failed"
            exit 1
          fi

      - name: Checkout full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set Git identity
        run: |
          git config user.name "senvora"
          git config user.email "192395417+senvora@users.noreply.github.com"

      - name: Squash history to one commit
        run: |
          set -e
          BRANCH="${{ github.ref_name }}"

          git checkout "$BRANCH"
          git checkout --orphan _temp
          git add -A
          git commit \
            --author="senvora <192395417+senvora@users.noreply.github.com>" \
            -m "Initial commit"

          git branch -M "$BRANCH"
          git push --force origin "$BRANCH"

  keep-latest-workflow-run:
    runs-on: ubuntu-latest
    needs: squash
    permissions:
      actions: write
      contents: read

    steps:
      - name: Keep only latest workflow run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -e

          KEEP=1
          SLEEP=1

          while true; do
            RESPONSE=$(curl -s \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO/actions/runs?per_page=100")

            IDS=($(echo "$RESPONSE" | jq -r '.workflow_runs[].id'))
            COUNT=${#IDS[@]}

            echo "Found $COUNT workflow runs"

            if [ "$COUNT" -le "$KEEP" ]; then
              echo "Only $KEEP run(s) left. Done."
              break
            fi

            # Skip the first (latest), delete the rest
            for ((i=KEEP; i<COUNT; i++)); do
              ID="${IDS[$i]}"
              echo "Deleting workflow run: $ID"

              curl -s -X DELETE \
                -H "Authorization: Bearer $GITHUB_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/$REPO/actions/runs/$ID" \
                >/dev/null

              sleep "$SLEEP"
            done
          done
